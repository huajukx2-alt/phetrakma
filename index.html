        const IconArrowRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>);
        const IconHeart = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>);
        const IconShare2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>);
        const IconRotateCcw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);

        // ชุดคำถาม 8 ข้อ สไตล์กวนๆ มั่นๆ ไม่คิดลบกับตัวเอง
        const questions = [
            { id: 1, question: { TH: "สมมติว่าหลงป่ากับเพื่อน คุณจะทำอะไร?", EN: "If you get lost in the forest with friends, what do you do?" }, options: [
                { text: { TH: "วิ่งนำหน้าเพื่อนไปก่อนเลย... เปล่า ไม่ได้สำรวจทาง กูหนี!", EN: "Run ahead! Not exploring the path, just fleeing!" }, trait: "A" }, 
                { text: { TH: "ปลีกวิเวกไปหามุมสงบๆ ปล่อยให้พวกที่เหลือโวยวายกันไป", EN: "Find a quiet corner, let the rest panic and scream." }, trait: "B" }, 
                { text: { TH: "นั่งส่งกำลังใจให้เพื่อนอยู่เฉยๆ พร้อมทำตาปริบๆ รอเพื่อนป้อนข้าว", EN: "Sit and cheer them on, making cute eyes waiting to be fed." }, trait: "C" }, 
                { text: { TH: "พลังงานหมด ขอทิ้งตัวนอนประท้วงป่าจนกว่าจะมีคนมาอุ้ม", EN: "Energy empty. I'll lay down and protest the forest until carried." }, trait: "D" }, 
                { text: { TH: "เดินหาจุดที่ลมเย็นที่สุด แล้วสถาปนาตัวเองเป็นเจ้าที่", EN: "Find the coolest breeze and establish myself as the local deity." }, trait: "E" }, 
                { text: { TH: "ใช้มารยาหญิง/ชาย บ่นปวดขานิดหน่อยให้เพื่อนใจอ่อนยอมแบก", EN: "Use my charm, complain about leg pain so friends melt and carry me." }, trait: "F" }] },
            
            { id: 2, question: { TH: "เวลาโดนคนเดินชนไหล่อย่างจัง ปฏิกิริยาแรกคือ?", EN: "Someone bumps into you hard. Your first reaction?" }, options: [
                { text: { TH: "แหกปากร้อง 'โอ๊ยยย!' ดังๆ ไว้ก่อน เอาให้คนมองทั้งถนน", EN: "Scream 'Ouch!' loudly so the whole street looks at them." }, trait: "G" }, 
                { text: { TH: "ปรายตามองหัวจรดเท้า แล้วปัดไหล่เบาๆ แบบผู้ดีรังเกียจฝุ่น", EN: "Look them up and down, casually brush off my shoulder like a dusty noble." }, trait: "H" }, 
                { text: { TH: "จังหวะชุลมุน เนียนๆ สแกนว่าของเขาแบรนด์เนมมั้ย ถ้าใช่ค่อยให้อภัย", EN: "Smoothly scan if their stuff is brand name. If yes, I forgive them." }, trait: "I" }, 
                { text: { TH: "เทศนาชุดใหญ่เรื่องมารยาททางสังคม เอาให้ยืนสำนึกผิดไม่ทัน", EN: "Preach a full sermon on social manners until they can't repent fast enough." }, trait: "J" }, 
                { text: { TH: "ทำทรงนักเลงฮึดฮัดใส่ แต่พอเขาหันขวับมา... เอ้า เดินหนีเฉย!", EN: "Act tough, but when they turn around... oops, fast-walk away!" }, trait: "K" }, 
                { text: { TH: "ส่งสายตาลูกหมาโดนทิ้ง เผื่อเขาหน้าตาดีแล้วขอเลี้ยงกาแฟไถ่โทษ", EN: "Send abandoned-puppy eyes, in case they're hot and buy me coffee to apologize." }, trait: "L" }] },
            
            { id: 3, question: { TH: "สไตล์การกินหมูกระทะของคุณคือ?", EN: "What is your Korean BBQ style?" }, options: [
                { text: { TH: "นินจาหน้าเตา คีบหมูรัวๆ ควันเข้าตาก็ไม่หวั่น สู้เพื่อของกิน!", EN: "Grill ninja, grabbing pork rapidly, fighting the smoke for food!" }, trait: "M" }, 
                { text: { TH: "นั่งสวยๆ หล่อๆ ถือตะเกียบเป็นพร็อพ รอคนย่างสุกแล้วคีบฉก", EN: "Sit pretty, using chopsticks as a prop, waiting to snatch cooked meat." }, trait: "N" }, 
                { text: { TH: "มัวแต่สแกนหาคนหน้าตาดีโต๊ะข้างๆ จนหมูในจานตัวเองไหม้", EN: "Busy scanning for hot people at the next table until my own pork burns." }, trait: "O" }, 
                { text: { TH: "ประกาศกร้าว! 'ชิ้นนี้กูจอง' ใครเอาตะเกียบมาแตะคือมีเรื่อง", EN: "Declare loudly 'This piece is MINE', touch it and we fight." }, trait: "P" }, 
                { text: { TH: "ปากบ่นว่าไฟอ่อน หมูสุกช้า แต่ตัวเองนั่งเฉยๆ ไม่ช่วยพลิกหมู", EN: "Complain the fire is slow, but sit there and don't help flip the meat." }, trait: "A" }, 
                { text: { TH: "ร้องวี้ดว้ายทุกครั้งที่น้ำมันกระเด็น ราวกับโดนน้ำมนต์สาด", EN: "Squeal every time oil splashes, as if hit by holy water." }, trait: "G" }] },
            
            { id: 4, question: { TH: "ไอเทมลับที่คุณขาดไม่ได้ในชีวิตประจำวัน?", EN: "Your indispensable everyday secret item?" }, options: [
                { text: { TH: "สมบัติส่วนตัวเต็มห้อง ที่แม่ชอบเรียกว่า 'กองขยะ' แต่เราเรียก 'ศิลปะ'", EN: "Room full of treasures that Mom calls 'trash' but I call 'Art'." }, trait: "B" }, 
                { text: { TH: "แว่นกันแดดทรงตัวแม่ ใส่เชิดๆ แม้ในวันที่แดดไม่ออก", EN: "Boss-bitch sunglasses, worn proudly even when there's no sun." }, trait: "H" }, 
                { text: { TH: "เสื้อยืดตัวเก่งที่ซักจนย้วย แต่ใส่สบายสุดๆ ใครห้ามทิ้งเด็ดขาด!", EN: "Favorite stretched-out t-shirt. Extremely comfy, absolutely no throwing it away!" }, trait: "M" }, 
                { text: { TH: "คาถาเรียกทรัพย์ ท่องทุกวันแต่ไม่ทำงาน รอฟ้าประทานเงินล้าน", EN: "Money-summoning spell, chanted daily (without working), waiting for millions." }, trait: "C" }, 
                { text: { TH: "ปากกาหรือไฟแช็กเพื่อน ที่เผลอหยิบติดมือมาเป็นของตัวเองบ่อยๆ", EN: "Friends' pens or lighters that somehow accidentally become mine constantly." }, trait: "I" }, 
                { text: { TH: "คลังสติ๊กเกอร์อ้อนๆ เอาไว้ส่งหาคนเปย์เวลาอยากกินขนมฟรี", EN: "Collection of begging stickers, ready to send to sponsors for free snacks." }, trait: "N" }] },
            
            { id: 5, question: { TH: "ถ้าต้องไปเดตแรก จะไปที่ไหน?", EN: "Where would you go on a first date?" }, options: [
                { text: { TH: "วิดีโอคอลเหอะ ขอครึ่งท่อนบนเป๊ะ ท่อนล่างใส่กางเกงนอน", EN: "Video call. Top half perfect, bottom half pajama pants." }, trait: "D" }, 
                { text: { TH: "ร้านอาหารแบบมีระดับ ถ้าคู่เดตเคี้ยวข้าวเสียงดังคือหักคะแนนรัวๆ", EN: "Classy restaurant. If the date chews loudly, massive point deductions." }, trait: "J" }, 
                { text: { TH: "บาร์ชิคๆ เพลงมันส์ๆ เผื่อเดตไม่รอดจะได้หันไปแจกเบอร์โต๊ะข้างๆ แทน", EN: "Chic bar. If the date flops, I can hand my number to the next table." }, trait: "O" }, 
                { text: { TH: "นัดเดินห้าง แต่เน้นนั่งแช่ตากแอร์ฟรีๆ ในร้านกาแฟแบบไม่ยอมลุก", EN: "Mall meetup, but mainly camping in a cafe for free AC without leaving." }, trait: "E" }, 
                { text: { TH: "พาไปทำกิจกรรมแอดเวนเจอร์ โชว์ความเท่ให้เขาหลงรักจนหัวปักหัวปำ", EN: "Take them to an adventure activity, show off my coolness so they fall hard." }, trait: "K" }, 
                { text: { TH: "สถานที่ไพรเวทสุดๆ ใครหน้าไหนก็ห้ามเข้ามาขัดจังหวะโลกส่วนตัวของเรา", EN: "Super private place. Absolutely no one is allowed to interrupt our private world." }, trait: "P" }] },
            
            { id: 6, question: { TH: "เวลาทำงานกลุ่ม สไตล์ของคุณคือแบบไหน?", EN: "What is your group project style?" }, options: [
                { text: { TH: "แกล้งมึนๆ งงๆ ให้เพื่อนรำคาญจนแย่งเอาไปทำเองหมด... หวานเจี๊ยบ!", EN: "Act confused so friends get annoyed and just do it all themselves... Sweet!" }, trait: "F" }, 
                { text: { TH: "สายเปย์ขนม ซื้อน้ำซื้อขนมมาบำรุงเพื่อน แลกกับการไม่ต้องทำเนื้องาน", EN: "Snack sponsor. Buy treats for friends in exchange for doing zero actual work." }, trait: "L" }, 
                { text: { TH: "ตอนพรีเซนต์ขอเสียงดังฟังชัด แอคติ้งระดับออสการ์ แต่งานเพื่อนทำ", EN: "Present loud and clear, Oscar-level acting, but friends did all the work." }, trait: "A" }, 
                { text: { TH: "รับบทผู้บริหาร นั่งชี้นิ้วสั่งงานอย่างมีวิสัยทัศน์ ส่วนลงมือทำ... เชิญพวกเธอจ้ะ", EN: "Take the CEO role. Point fingers and give visionary orders. Actual work? You do it." }, trait: "H" }, 
                { text: { TH: "แต่งตัวสวย/หล่อมารอเป็นหน้าตาของกลุ่ม งานไม่ยุ่ง มุ่งแต่เป็นกำลังใจ", EN: "Dress up nicely to be the face of the group. No working, just moral support." }, trait: "N" }, 
                { text: { TH: "หายตัวไปอย่างลึกลับตอนแบ่งงาน แล้วค่อยโผล่มาอีกทีตอนใส่ชื่อ", EN: "Disappear mysteriously during task division, magically reappear to add my name." }, trait: "E" }] },
            
            { id: 7, question: { TH: "วันหยุดพักผ่อนที่สมบูรณ์แบบของคุณ?", EN: "Your perfect day off?" }, options: [
                { text: { TH: "นอนแผ่หลาเป็นผักกาดเหี่ยวๆ รอมีคนใจดีชวนไปเลี้ยงข้าว", EN: "Lay flat like a wilted lettuce, waiting for a kind soul to invite me for a free meal." }, trait: "C" }, 
                { text: { TH: "นั่งจิบชาหน้าบ้าน คอยจับผิดวัยรุ่นซอยข้างๆ แล้วส่ายหัวเบาๆ", EN: "Sip tea on the porch, judge the neighborhood teens, and softly shake my head." }, trait: "J" }, 
                { text: { TH: "สร้างอาณาจักรบนโซฟา ใครมาแย่งที่นั่งหรือแย่งรีโมทคือประกาศสงคราม!", EN: "Build an empire on the sofa. Stealing my seat or remote is declaring war!" }, trait: "P" }, 
                { text: { TH: "ไถโซเชียลตามเผือกทุกดราม่าแบบเรียลไทม์ พลาดไม่ได้แม้แต่วินาทีเดียว", EN: "Scroll social media, following every drama in real-time. Can't miss a single second." }, trait: "G" }, 
                { text: { TH: "ออกไปหาทำกิจกรรมให้เหงื่อท่วมร่าง ยิ่งเลอะเทอะยิ่งรู้สึกว่าได้ใช้ชีวิต", EN: "Go find an activity to drench in sweat. The messier, the more 'alive' I feel." }, trait: "M" }, 
                { text: { TH: "จัดห้องแบบลวกๆ ย้ายของกองซ้ายไปกองขวา แล้วภูมิใจว่าห้องสะอาดแล้ว", EN: "Tidy the room lazily. Move the pile from left to right, and feel proud it's 'clean'." }, trait: "B" }] },
            
            { id: 8, question: { TH: "คติประจำใจของคุณคือข้อไหน?", EN: "Which motto describes you best?" }, options: [
                { text: { TH: "เรื่องพรุ่งนี้ ให้ฉันในวันพรุ่งนี้เป็นคนจัดการ... ตอนนี้ขอนอนก่อน", EN: "Leave tomorrow's problems to tomorrow's me... Right now, I sleep." }, trait: "D" }, 
                { text: { TH: "ของของเพื่อนก็เหมือนของของเรา ขอยืมร้อยปีเดี๋ยวเอามาคืน", EN: "A friend's stuff is my stuff. Let me borrow it for 100 years, I'll return it." }, trait: "I" }, 
                { text: { TH: "รักเดียวใจเดียวมันเชย ยุคนี้มันต้องหว่านเสน่ห์ให้ครอบคลุมทุกพื้นที่!", EN: "Monogamy is outdated. In this era, you must cast your net of charm everywhere!" }, trait: "O" }, 
                { text: { TH: "น้ำตาเทียมและมารยาร้อยเล่มเกวียน คือหนทางสู่มื้ออาหารฟรี!", EN: "Artificial tears and a thousand tricks are the path to free meals!" }, trait: "F" }, 
                { text: { TH: "ศักดิ์ศรีมันค้ำคอ! ถึงจะปอดแหกอยู่ลึกๆ แต่หน้าตากูต้องดูเก๋าไว้ก่อน", EN: "Pride is everything! Even if terrified inside, my face must look hardcore." }, trait: "K" }, 
                { text: { TH: "เกิดมาหน้าตาดีถือเป็นอาวุธ ใช้ความน่าเอ็นดูสะกดจิตให้คนยอมเปย์", EN: "Being born good-looking is a weapon. Use cuteness to hypnotize people into paying." }, trait: "L" }] }
        ];

        // ข้อมูลผลลัพธ์ 16 สายพันธุ์ (ยังคงความตลก/ด่าเจ็บ ไว้เหมือนเดิม)
        const results = {

                }

                setScores({ A: 0, B: 0, C: 0, D: 0, E: 0, F: 0, G: 0, H: 0, I: 0, J: 0, K: 0, L: 0, M: 0, N: 0, O: 0, P: 0 }); 
                setCurrentQuestionIndex(0); 
                setScreen('quiz'); 
            };
            
            const handleAnswer = (trait) => {
                setScores(prev => ({ ...prev, [trait]: prev[trait] + 1 }));
                if (currentQuestionIndex < questions.length - 1) { 
                    setCurrentQuestionIndex(prev => prev + 1); 
                } else { 
                    processResult(); 
                }
            };
            
            const processResult = () => {
                setScreen('loading');

                    const topTraits = Object.keys(scores).filter(trait => scores[trait] === maxScore);
                    const randomWinningTrait = topTraits[Math.floor(Math.random() * topTraits.length)];
                    setFinalResult(randomWinningTrait);

            const resetQuiz = () => { setScreen('home'); setFinalResult(null); };

                                    <h1 className="text-2xl md:text-3xl font-bold text-[#4a3f35] mb-2 leading-tight">{lang === 'TH' ? 'คุณเป็นหมาประเภทไหน?' : 'What kind of dog are you?'}</h1>

                                </div>

                                <h2 className="text-2xl font-bold text-[#4a3f35] mb-4">{lang === 'TH' ? '🚨 คำเตือนก่อนเล่น 🚨' : '🚨 Trigger Warning 🚨'}</h2>
                                <p className="text-[#6c5f53] mb-8 text-sm leading-relaxed">
                                    {lang === 'TH' ? (<>เว็บไซต์นี้สร้างขึ้นมาเพื่อความ <b>บันเทิงและขำขัน</b><br/><br/>หากคุณเป็น <span className="text-red-500 font-bold">โรคซึมเศร้า แพนิค หรือเป็นคนเซนซิทีฟคิดมาก</span><br/>แอดมินแนะนำให้ <b>ปิดหน้านี้ไปเลย</b> นะครับ<br/>(เป็นห่วงสุขภาพจิตใจจริงๆ น้า 🥺)</>) : (<>This website is made for <b>entertainment and jokes</b>.<br/><br/>If you suffer from <span className="text-red-500 font-bold">depression, panic attacks, or are sensitive</span>,<br/>we highly recommend you <b>close this page now</b>.<br/>(We truly care about your mental health 🥺)</>)}
                                </p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={proceedToQuiz} className="w-full bg-[#ffb067] text-white rounded-full py-4 px-8 font-bold text-base shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300">{lang === 'TH' ? 'ฉันสตรองพอ! ขอไปต่อ' : 'I am strong! Let\'s go'}</button>
                                    <button onClick={resetQuiz} className="w-full bg-white border-2 border-[#e6dfd5] text-[#5c4d43] rounded-full py-4 px-8 font-bold text-base hover:border-[#ffb067] hover:bg-[#fff9f2] transition-all duration-300">{lang === 'TH' ? 'กลับหน้าแรกดีกว่า' : 'Go back to home'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {screen === 'quiz' && (
                        <div className="max-w-md w-full animate-fade-in flex flex-col">
                            <div className="mb-6 px-2">
                                <div className="flex justify-between text-xs text-[#8e7f72] font-medium mb-2">
                                    <span>{lang === 'TH' ? 'คำถามที่' : 'Question'} {currentQuestionIndex + 1}</span>
                                    <span>{lang === 'TH' ? `${questions.length} ข้อ` : `${questions.length} total`}</span>
                                </div>
                                <div className="w-full bg-[#f0eae1] rounded-full h-2.5 overflow-hidden">
                                    <div className="bg-[#ffb067] h-2.5 rounded-full transition-all duration-500 ease-out" style={{ width: `${((currentQuestionIndex + 1) / questions.length) * 100}%` }}></div>
                                </div>
                            </div>
                            <div className="bg-white rounded-[2rem] shadow-sm border border-[#f0eae1] p-6 md:p-8 w-full mb-6">
                                <h2 className="text-xl font-bold text-[#4a3f35] mb-8 text-center leading-snug">{questions[currentQuestionIndex].question[lang]}</h2>
                                <div className="flex flex-col gap-3">
                                    {questions[currentQuestionIndex].options.map((option, idx) => (
                                        <button key={idx} onClick={() => handleAnswer(option.trait)} className="w-full text-left bg-white border-2 border-[#e6dfd5] text-[#5c4d43] rounded-2xl py-4 px-6 font-medium hover:border-[#ffb067] hover:bg-[#fff9f2] active:bg-[#ffeedb] transition-all duration-200 shadow-sm">
                                            {option.text[lang]}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {screen === 'loading' && (
                        <div className="max-w-md w-full h-[60vh] flex flex-col items-center justify-center animate-fade-in">
                            <div className="relative w-24 h-24 mb-6 animate-bounce">
                                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#FBBF24" /><ellipse cx="25" cy="50" rx="10" ry="20" fill="#D97706" /><ellipse cx="75" cy="50" rx="10" ry="20" fill="#D97706" /><circle cx="35" cy="50" r="6" fill="#FFF" /><circle cx="65" cy="50" r="6" fill="#FFF" /><circle cx="33" cy="50" r="2" fill="#1C1917" /><circle cx="67" cy="50" r="2" fill="#1C1917" /><circle cx="50" cy="60" r="12" fill="#FEF3C7" /><polygon points="46,55 54,55 50,60" fill="#431407" /><path d="M 45 62 Q 50 70 55 62 Z" fill="#FCA5A5" /></svg>
                                <div className="absolute top-0 right-[-10px] animate-ping"><IconSparkles className="w-4 h-4 text-yellow-400" /></div>
                                <div className="absolute bottom-0 left-[-10px] animate-ping" style={{animationDelay: '0.5s'}}><IconSparkles className="w-6 h-6 text-yellow-400" /></div>
                            </div>
                            <h2 className="text-xl font-bold text-[#4a3f35] mb-2">{lang === 'TH' ? 'กำลังประมวลผล...' : 'Processing...'}</h2>
                            <p className="text-[#8e7f72] text-sm">{lang === 'TH' ? 'ค้นหา DNA ความเป็นหมาในตัวคุณ 🦴' : 'Finding your inner dog DNA 🦴'}</p>
                        </div>
                    )}

                    {screen === 'result' && finalResult && (
                        <div className="max-w-md w-full animate-fade-in flex flex-col items-center pb-10">
                            <div className={`w-full rounded-[2.5rem] shadow-sm border border-[#f0eae1] p-8 md:p-10 text-center relative overflow-hidden bg-white mb-6`}>
                                <p className="text-sm font-bold text-[#8e7f72] tracking-widest uppercase mb-4">{lang === 'TH' ? 'สภาพอย่างมึงคือ...' : 'Your pathetic state is...'}</p>
                                <div className={`w-48 h-48 mx-auto rounded-full ${results[finalResult].bgClass} flex items-center justify-center mb-6 border-4 border-white shadow-inner relative [&>svg]:w-40 [&>svg]:h-40`}>
                                    <div className="absolute w-full h-full animate-spin-slow rounded-full border-2 border-dashed border-[#e6dfd5] opacity-50 pointer-events-none"></div>
                                    {results[finalResult].illustration}
                                </div>
                                <h1 className={`text-2xl md:text-3xl font-bold mb-2 ${results[finalResult].textClass}`}>{results[finalResult].title[lang]}</h1>
                                <p className="text-[#ffb067] font-medium mb-6">"{results[finalResult].subtitle[lang]}"</p>
                                <div className="w-12 h-1 bg-gray-200 mx-auto rounded-full mb-6"></div>
                                <p className="text-[#6c5f53] text-sm leading-relaxed mb-8 text-left bg-gray-50 p-5 rounded-2xl">{results[finalResult].description[lang]}</p>
                                <div className="bg-[#fff9f2] border border-[#ffe0c2] rounded-2xl p-4 mb-8 text-left flex items-start gap-4">
                                    <div className="bg-[#ffb067] p-2 rounded-xl text-white"><IconHeart className="w-5 h-5" /></div>
                                    <div>
                                        <h3 className="text-sm font-bold text-[#4a3f35] mb-1">{lang === 'TH' ? 'พวกที่สมควรอยู่กับมึง' : 'Those who deserve to be with you'}</h3>
                                        <p className="text-[#8e7f72] text-sm">{results[finalResult].compatible[lang]}</p>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-3">
                                    <button onClick={handleShare} className="w-full bg-[#4a3f35] text-white rounded-full py-4 px-8 font-bold text-base hover:bg-[#342c25] hover:-translate-y-1 transition-all duration-300 flex justify-center items-center gap-2"><IconShare2 className="w-5 h-5" /> {lang === 'TH' ? 'ประจานตัวเองให้เพื่อนดู' : 'Expose yourself to friends'}</button>
                                    <button onClick={resetQuiz} className="w-full bg-white border-2 border-[#e6dfd5] text-[#5c4d43] rounded-full py-4 px-8 font-bold text-base hover:border-[#ffb067] hover:bg-[#fff9f2] transition-all duration-300 flex justify-center items-center gap-2"><IconRotateCcw className="w-5 h-5" /> {lang === 'TH' ? 'ยอมรับความจริงไม่ได้? กดเล่นใหม่ดิ' : 'Cannot accept the truth? Play again'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const rootElement = document.getElementById("root");
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
