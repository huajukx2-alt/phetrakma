        const IconHeart = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>);

        // ข้อมูลคำถาม 10 ข้อ
        const questions = [
            { id: 1, question: { TH: "วันหยุดยาวนี้ คุณอยากทำกิจกรรมอะไรมากที่สุด?", EN: "What do you want to do most this long weekend?" }, options: [{ text: { TH: "ออกไปวิ่งเล่น แอดเวนเจอร์ ลุยป่า!", EN: "Go out, run, and adventure in the wild!" }, trait: "A" }, { text: { TH: "นอนอยู่บ้านเงียบๆ ฟังเพลง ไม่อยากเจอใคร", EN: "Stay home silently, listening to music, avoiding people." }, trait: "B" }, { text: { TH: "ไปคาเฟ่หรือสวนสาธารณะ เจอผู้คนเยอะๆ", EN: "Go to cafes or parks, seeing lots of people." }, trait: "C" }, { text: { TH: "นอนกลิ้งบนโซฟานุ่มๆ พร้อมขนมเต็มโต๊ะ", EN: "Roll on a soft sofa with a table full of snacks." }, trait: "D" }, { text: { TH: "เดินตากแอร์ห้างฟรีๆ ไม่ซื้ออะไร", EN: "Walk in the mall for free AC, buy nothing." }, trait: "E" }, { text: { TH: "ไปเดินตลาดหาของกินฟรี ชิมทุกร้าน", EN: "Go to the market, taste free samples everywhere." }, trait: "F" }] },
            { id: 2, question: { TH: "เวลาเจอคนที่ไม่รู้จักเข้ามาทักทาย หรือมาหาถึงที่ คุณจะ...", EN: "When a stranger approaches or visits you, you will..." }, options: [{ text: { TH: "แอบด่าในใจ แต่ต่อหน้าทำเป็นยิ้มเจื่อนๆ", EN: "Complain mentally, but smile awkwardly in front of them." }, trait: "G" }, { text: { TH: "มองเหยียดตั้งแต่หัวจรดเท้า แล้วเชิดใส่", EN: "Look them up and down, then act snobbish." }, trait: "H" }, { text: { TH: "สังเกตพฤติกรรมเขาก่อน เผื่อมีอะไรให้เราได้เปรียบ", EN: "Observe them closely to find any advantage." }, trait: "I" }, { text: { TH: "รำคาญ! คนกำลังยุ่ง ทักมาทำไม", EN: "Annoyed! I'm busy, why bother me?" }, trait: "J" }, { text: { TH: "ทำตัวกร่าง วางมาดข่มไว้ก่อน", EN: "Act tough and assert dominance immediately." }, trait: "K" }, { text: { TH: "ทำตัวน่าสงสาร เผื่อเขาจะเลี้ยงขนมหรือให้ของฟรี", EN: "Act pitiful in case they offer free treats." }, trait: "L" }] },
            { id: 3, question: { TH: "อะไรคือสิ่งที่เยียวยาจิตใจคุณได้ดีที่สุด?", EN: "What heals your soul the best?" }, options: [{ text: { TH: "การได้ทำงานหนักๆ ลุยๆ จนลืมความเครียด", EN: "Working hard and getting dirty to forget stress." }, trait: "M" }, { text: { TH: "การลงสตอรี่เศร้าๆ เรียกร้องความสนใจให้คนมาโอ๋", EN: "Posting sad stories to get attention and comfort." }, trait: "N" }, { text: { TH: "การได้ออกไปบริหารเสน่ห์ เช็คเรตติ้งตัวเอง", EN: "Going out to flirt and check my ratings." }, trait: "O" }, { text: { TH: "การได้นั่งนับเงิน หรือปกป้องของหวงไม่ให้ใครแตะ", EN: "Counting money or fiercely guarding my stuff." }, trait: "P" }, { text: { TH: "การได้ออกกำลังกาย หรือทำกิจกรรมที่ได้เหงื่อ", EN: "Working out or doing sweaty activities." }, trait: "A" }, { text: { TH: "ของสะสมชิ้นโปรดที่หวงมากๆ ห้ามใครแตะ", EN: "Favorite collectibles that nobody is allowed to touch." }, trait: "B" }] },
            { id: 4, question: { TH: "เวลาเพื่อนกำลังเศร้า คุณจะทำอย่างไร?", EN: "When a friend is sad, what do you do?" }, options: [{ text: { TH: "เข้าไปกอด ปลอบใจ และรับฟังอย่างตั้งใจ", EN: "Hug, comfort, and listen to them carefully." }, trait: "C" }, { text: { TH: "พาไปหาของกินอร่อยๆ เผื่ออารมณ์ดีขึ้น", EN: "Take them to eat good food to cheer them up." }, trait: "D" }, { text: { TH: "เมิน ไม่ใช่เรื่องของฉัน ขี้เกียจรับฟังปัญหา", EN: "Ignore them, not my problem, too lazy to listen." }, trait: "E" }, { text: { TH: "หลอกให้เพื่อนเลี้ยงข้าว อ้างว่ากินแล้วจะอารมณ์ดีขึ้น", EN: "Trick them into buying ME food, saying it helps." }, trait: "F" }, { text: { TH: "โพสต์ด่าลอยๆ แทนเพื่อน แต่ไม่ไปช่วยเคลียร์นะ", EN: "Post vague insults online for them, but do nothing real." }, trait: "G" }, { text: { TH: "พาไปช้อปปิ้งของแพงๆ โชว์รวยปลอบใจ", EN: "Take them luxury shopping, flexing wealth to comfort." }, trait: "H" }] },
            { id: 5, question: { TH: "สไตล์การทำงานหรือการเรียน ของคุณเป็นแบบไหน?", EN: "What is your working or studying style like?" }, options: [{ text: { TH: "ลอกงานเพื่อนเนียนๆ ไม่ให้ใครจับได้", EN: "Smoothly copy friends' work without getting caught." }, trait: "I" }, { text: { TH: "หัวโบราณ ยึดติดวิธีเดิมๆ ไม่ฟังเด็กยุคใหม่", EN: "Old-school, stick to old ways, ignore the youth." }, trait: "J" }, { text: { TH: "ชอบสั่งคนอื่นให้ทำแทน ทำตัวเป็นลูกพี่", EN: "Boss others around, act like the top dog." }, trait: "K" }, { text: { TH: "ทำตัวใสซื่อ อ้อนให้คนอื่นช่วยทำให้", EN: "Act innocent and beg others to do it for me." }, trait: "L" }, { text: { TH: "ถึกทน ทำงานหนักแค่ไหนก็ได้ ขอแค่เงินถึง", EN: "Endure heavy work, as long as the pay is good." }, trait: "M" }, { text: { TH: "ทำตัวบอบบาง ทำนิดทำหน่อยก็บ่นเหนื่อย", EN: "Act fragile, complain about being tired after 5 minutes." }, trait: "N" }] },
            { id: 6, question: { TH: "คุณคิดว่าข้อเสียของตัวเองคืออะไร?", EN: "What do you think is your flaw?" }, options: [{ text: { TH: "เจ้าชู้ บ้ากาม วันๆ คิดแต่เรื่องส่องหนุ่ม/สาว", EN: "Flirty, horny, always checking out guys/girls." }, trait: "O" }, { text: { TH: "ขี้หวงเกินเหตุ ใครแตะของฉันคือตาย!", EN: "Overly possessive, touch my stuff and you die!" }, trait: "P" }, { text: { TH: "ไฮเปอร์เกินไป อยู่นิ่งๆ ไม่ค่อยได้", EN: "Too hyper, can't really sit still." }, trait: "A" }, { text: { TH: "ดื้อเงียบ เอาแต่ใจตัวเองนิดๆ", EN: "Stubborn, a bit self-centered secretly." }, trait: "B" }, { text: { TH: "ขี้เหงา ขาดความใส่ใจไม่ได้", EN: "Lonely, can't survive without attention." }, trait: "C" }, { text: { TH: "ขี้เกียจ และเห็นแก่กินมากไปหน่อย", EN: "Lazy and a bit too greedy for food." }, trait: "D" }] },
            { id: 7, question: { TH: "ถ้าคุณทำผิด แล้วโดนจับได้ คุณจะทำหน้ายังไง?", EN: "If you do something wrong and get caught, what's your face?" }, options: [{ text: { TH: "ทำหน้ามึนใส่ กูไม่ผิด มึงอะผิดที่มาจับผิดกู!", EN: "Look blank. I'm not wrong, you're wrong for looking!" }, trait: "E" }, { text: { TH: "บีบน้ำตา แสดงละครฉากใหญ่ว่าโดนใส่ร้าย", EN: "Fake cry, put on a big show that I was framed." }, trait: "F" }, { text: { TH: "โวยวายเสียงดังกลบเกลื่อนความผิด", EN: "Yell loudly to cover up the guilt." }, trait: "G" }, { text: { TH: "เชิดใส่! ระดับฉันไม่มีคำว่าผิดย่ะ", EN: "Chin up! My level doesn't make mistakes." }, trait: "H" }, { text: { TH: "โยนความผิดให้คนอื่นหน้าตาเฉย", EN: "Blame someone else shamelessly." }, trait: "I" }, { text: { TH: "อ้างความอาวุโส อาบน้ำร้อนมาก่อน กูถูกเสมอ!", EN: "Claim seniority, I was here first so I'm right!" }, trait: "J" }] },
            { id: 8, question: { TH: "สเปกคนที่คุณอยากอยู่ด้วยมากที่สุดคือแบบไหน?", EN: "What kind of person do you want to be with the most?" }, options: [{ text: { TH: "คนที่ยอมเป็นเบี้ยล่าง คอยทำตามคำสั่งเรา", EN: "Someone who yields to me and follows my orders." }, trait: "K" }, { text: { TH: "คนใจดี เปย์เก่ง มีของกินมาหลอกล่อตลอด", EN: "Kind, generous, always has treats to lure me." }, trait: "L" }, { text: { TH: "สายลุยๆ ติดดิน กินง่ายอยู่ง่าย ไม่เรื่องเยอะ", EN: "Down-to-earth, easy-going, no drama." }, trait: "M" }, { text: { TH: "คนรวยใจบุญที่พร้อมอุปถัมภ์เราไปตลอดชีวิต", EN: "A rich philanthropist ready to sponsor my whole life." }, trait: "N" }, { text: { TH: "หน้าตาดี หุ่นแซ่บ เรื่องอื่นช่างมัน!", EN: "Good looking, hot body, nothing else matters!" }, trait: "O" }, { text: { TH: "คนที่ให้พื้นที่ส่วนตัว และไม่มาจุ้นจ้านกับเรา", EN: "Someone who gives space and respects my boundaries." }, trait: "P" }] },
            { id: 9, question: { TH: "งานอดิเรกสุดโปรดของคุณคืออะไร?", EN: "What is your favorite hobby?" }, options: [{ text: { TH: "หาทำกิจกรรมผาดโผน หาเรื่องเจ็บตัว", EN: "Extreme activities, looking for trouble." }, trait: "A" }, { text: { TH: "สะสมขยะไว้ในห้องจนไม่มีที่เดิน", EN: "Hoarding junk until there's no space to walk." }, trait: "B" }, { text: { TH: "นั่งส่องสตอรี่ชาวบ้านแล้วรีพลายคุยด้วย", EN: "Watching everyone's stories and replying." }, trait: "C" }, { text: { TH: "กินแล้วนอน นอนแล้วกิน วนลูปไปเรื่อยๆ", EN: "Eat and sleep, sleep and eat. Loop." }, trait: "D" }, { text: { TH: "อู้งานไปตากแอร์ตามห้าง", EN: "Slacking off to enjoy free AC at the mall." }, trait: "E" }, { text: { TH: "หาทางหลอกแดกฟรีตามงานอีเวนต์", EN: "Finding ways to eat for free at events." }, trait: "F" }] },
            { id: 10, question: { TH: "เวลาหิวตอนดึก คุณจะจัดการความหิวอย่างไร?", EN: "How do you handle late-night hunger?" }, options: [{ text: { TH: "โวยวายหรือบ่นลงโซเชียลจนกว่าจะมีคนสนใจ", EN: "Complain loudly on social media until someone cares." }, trait: "G" }, { text: { TH: "สั่งเดลิเวอรี่ร้านหรูๆ เท่านั้น ของถูกๆ ไม่กิน", EN: "Order only premium delivery, no cheap food." }, trait: "H" }, { text: { TH: "ย่องไปขโมยของกินคนอื่นในตู้เย็น", EN: "Sneak to steal food from someone else's fridge." }, trait: "I" }, { text: { TH: "บ่นว่าหิวแต่ไม่ทำอะไร ทนหิวจนหลับไปเอง", EN: "Complain about hunger but do nothing till asleep." }, trait: "J" }, { text: { TH: "บังคับให้คนในบ้านลุกไปหาอะไรมาให้กิน", EN: "Force someone in the house to get me food." }, trait: "K" }, { text: { TH: "ทักไปอ้อนเพื่อนด้วยสติ๊กเกอร์น่าสงสารให้มันเลี้ยง", EN: "Send sad stickers to friends so they buy me food." }, trait: "L" }] }
        ];

        // ข้อมูลผลลัพธ์ 16 สายพันธุ์
        const results = {
            A: { title: { TH: "หมาจรจัดข้างถนนขี้เรื้อน", EN: "Mangy Street Dog" }, subtitle: { TH: "ทำทรงห้าวแต่จริงๆ วิ่งหางจุกตูด ดีแต่เห่าใบตองแห้ง", EN: "Acts tough but runs away. All bark, no bite." }, description: { TH: "มึงแม่งเป็นพวกทำตัวกร่างไปวันๆ เรียกร้องความสนใจเก่งแต่เอาเข้าจริงก็ปอดแหก! ดีแต่เห่าคนแปลกหน้าแต่พอโดนกระทืบเท้าใส่ก็วิ่งหนีหางจุกตูด ชีวิตนี้ไม่มีอะไรดีนอกจากเดินเกะกะขวางทางให้คนเขาสาปแช่งเล่นๆ ถุย!", EN: "You act tough to get attention, but you're actually a coward! You only bark at strangers, but run away when someone stomps. You do nothing but block the road and get cursed at. Spit!" }, compatible: { TH: "ไม่มีใครอยากคบด้วยหรอก สภาพ!", EN: "Nobody wants to be with you, look at you!" }, color: "#EF4444", bgClass: "bg-red-50", textClass: "text-red-600", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#D97706" /><polygon points="15,35 25,10 40,30" fill="#B45309" /><polygon points="85,35 95,50 60,30" fill="#B45309" /><circle cx="35" cy="45" r="8" fill="#FFF" /><circle cx="38" cy="45" r="3" fill="#1C1917" /><circle cx="65" cy="45" r="8" fill="#FFF" /><circle cx="62" cy="48" r="2" fill="#1C1917" /><ellipse cx="50" cy="62" rx="15" ry="12" fill="#FEF3C7" /><polygon points="46,56 54,56 50,60" fill="#1C1917" /><path d="M 45 66 Q 50 70 55 66" stroke="#1C1917" strokeWidth="2" fill="none" /><path d="M 50 66 Q 58 75 50 80 Q 42 75 50 66" fill="#FCA5A5" /></svg>) },
            B: { title: { TH: "หมาจรคุ้ยขยะเปียก", EN: "Dumpster Diver Dog" }, subtitle: { TH: "คิดว่าตัวเองอินดี้ แต่จริงๆ แค่ไม่มีใครคบ ซกมก!", EN: "Thinks they are indie, actually just dirty and lonely!" }, description: { TH: "อย่ามาอ้างว่าโลกส่วนตัวสูง มึงแค่เข้าสังคมไม่เป็นแถมยังซกมก! วันๆ เอาแต่หมกตัวทำตัวไร้ค่าเหมือนหมาคุ้ยเศษอาหารเน่าๆ ในถังขยะ เลิกเบียวคิดว่าตัวเองเท่ได้แล้ว ไม่มีใครเขามองว่ามึงลึกลับน่าค้นหาหรอก เขามองว่ามึงน่ารำคาญ!", EN: "Don't claim you're an introvert, you just lack social skills and smell like wet trash! Stop acting cool, no one finds you mysterious. They just find you annoying!" }, compatible: { TH: "แมลงวันและหนูท่อ (คู่ควรกับมึงที่สุดแล้ว)", EN: "Flies and sewer rats (The perfect match for you)" }, color: "#6B7280", bgClass: "bg-gray-100", textClass: "text-gray-700", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#6B7280" /><polygon points="10,40 25,20 40,35" fill="#4B5563" /><polygon points="90,40 75,20 60,35" fill="#4B5563" /><circle cx="32" cy="50" r="10" fill="#FCD34D" /><circle cx="35" cy="48" r="3" fill="#111827" /><circle cx="68" cy="48" r="4" fill="#FCD34D" /><circle cx="68" cy="46" r="1.5" fill="#111827" /><polygon points="47,60 53,60 50,64" fill="#111827" /><path d="M 45 68 Q 50 72 55 64" stroke="#111827" strokeWidth="2" fill="none" /><path d="M 55 64 Q 60 75 55 75 Q 50 75 55 64" fill="#FCA5A5" /></svg>) },
            C: { title: { TH: "หมาวัดหน้าด้าน", EN: "Shameless Temple Dog" }, subtitle: { TH: "วันๆ ไม่ทำห่าอะไร รอกินแต่ข้าวแจกฟรี เป็นภาระหลวงตา", EN: "Does nothing all day, waits for free food. A true burden." }, description: { TH: "มึงนี่มันตัวภาระสังคมของแท้! ชีวิตเอาแต่อ้าปากรอให้คนอื่นป้อนข้าวป้อนน้ำ ทำตัวเนียนๆ เกาะคนอื่นกินไปวันๆ ไม่มีความพยายามอะไรเลย เกิดมาเปลืองข้าวสุกหลวงตาเปล่าๆ ชาตินี้ทำอะไรสำเร็จด้วยตัวเองบ้างมั้ยนอกจากนอนเกาหมัดหน้าศาลา?", EN: "You are a literal parasite to society! Waiting for people to spoon-feed you. Have you achieved anything in life besides sleeping and scratching fleas all day?" }, compatible: { TH: "ปลิง เห็บ หมัด (พวกชอบสูบเลือดคนอื่นเหมือนกัน)", EN: "Leeches and ticks (Bloodsuckers just like you)" }, color: "#F59E0B", bgClass: "bg-amber-50", textClass: "text-amber-600", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#FDE68A" /><path d="M 15 40 Q 25 10 40 30 Z" fill="#FCD34D" /><path d="M 85 40 Q 75 10 60 30 Z" fill="#FCD34D" /><circle cx="30" cy="45" r="8" fill="#FFF" /><circle cx="30" cy="45" r="1.5" fill="#1C1917" /><circle cx="70" cy="45" r="8" fill="#FFF" /><circle cx="70" cy="45" r="1.5" fill="#1C1917" /><circle cx="50" cy="62" r="14" fill="#FFFBEB" /><polygon points="45,58 55,58 50,62" fill="#431407" /><path d="M 40 68 Q 50 72 60 68" stroke="#431407" strokeWidth="2" fill="none" /><path d="M 45 69 Q 50 85 55 69 Z" fill="#FCA5A5" /></svg>) },
            D: { title: { TH: "หมาเหลือขอข้างบ้าน", EN: "Lazy Backyard Stray" }, subtitle: { TH: "มึงแม่งเป็นหมาขี้เกียจ ชีวิตเอาแต่นอน รกโลก!", EN: "You're a lazy dog, born to sleep and waste space!" }, description: { TH: "มึงแม่งคือจุดต่ำสุดของห่วงโซ่อาหาร! วันๆ ไม่ทำห่าอะไรนอกจากนอนแดกแล้วก็นอน ทำหน้ามึนๆ ตีเนียนขอของกินชาวบ้านไปทั่ว ไร้ศักดิ์ศรีสุดๆ! โตป่านนี้ยังทำตัวเป็นภาระให้คนอื่นต้องคอยเวทนา ชีวิตมึงมีค่าแค่เปลี่ยนออกซิเจนเป็นคาร์บอนไดออกไซด์แค่นั้นแหละ ไอ้อ้วน!", EN: "You're the bottom of the food chain! You do nothing but eat and sleep, acting innocent to beg for food. You have zero dignity. You're just converting oxygen to carbon dioxide!" }, compatible: { TH: "หมอนเน่าๆ ของมึงนั่นแหละ ไปนอนซะไป๊!", EN: "Your smelly old pillow. Go back to sleep!" }, color: "#8B5CF6", bgClass: "bg-purple-50", textClass: "text-purple-700", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#FAFAF9" /><circle cx="70" cy="35" r="12" fill="#44403C" /><polygon points="15,45 25,25 45,35" fill="#292524" /><polygon points="85,45 75,25 55,35" fill="#292524" /><circle cx="28" cy="50" r="7" fill="#FFF" /><circle cx="23" cy="50" r="2" fill="#1C1917" /><circle cx="72" cy="50" r="7" fill="#FFF" /><circle cx="77" cy="50" r="2" fill="#1C1917" /><ellipse cx="50" cy="65" rx="16" ry="12" fill="#F5F5F4" /><polygon points="46,60 54,60 50,64" fill="#1C1917" /><path d="M 42 70 Q 50 74 58 70" stroke="#1C1917" strokeWidth="2" fill="none" /><path d="M 48 72 Q 50 80 52 72" fill="#FCA5A5" /></svg>) },
            E: { title: { TH: "หมาแอร์หน้าเซเว่น", EN: "7-11 Aircon Dog" }, subtitle: { TH: "นอนขวางประตูเซเว่น ไม่หลบใคร หน้าด้านหน้าทน", EN: "Blocks the 7-11 door, refuses to move, totally shameless." }, description: { TH: "มึงคือหมาหน้าเซเว่น! ชีวิตรักความสบายแต่ไม่อยากดิ้นรน เลยอาศัยแอร์ฟรีจากประตูเซเว่น ใครเดินผ่านก็ต้องหลบให้มึงเพราะมึงหน้าหนาเกินกว่าจะขยับตัว! สันหลังยาวที่แท้ทรู เป็นภาระของพนักงานร้านเว่อร์!", EN: "You are the 7-11 door dog! You love comfort but hate working for it, so you steal free AC. Everyone has to step over you because you're too thick-skinned to move! A true burden to the cashiers!" }, compatible: { TH: "กระจกประตูเซเว่น (เพื่อนแท้ที่มึงชอบเอาหน้าไปแนบ)", EN: "The 7-11 Glass Door (Your true best friend)" }, color: "#10B981", bgClass: "bg-emerald-50", textClass: "text-emerald-600", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#D1FAE5" /><path d="M 10 50 Q 25 20 40 40" fill="#10B981" /><path d="M 90 50 Q 75 20 60 40" fill="#10B981" /><path d="M 28 50 L 42 50" stroke="#064E3B" strokeWidth="3" strokeLinecap="round" /><path d="M 58 50 L 72 50" stroke="#064E3B" strokeWidth="3" strokeLinecap="round" /><ellipse cx="50" cy="65" rx="16" ry="12" fill="#A7F3D0" /><polygon points="46,60 54,60 50,63" fill="#064E3B" /><circle cx="58" cy="65" r="5" fill="#FFF" stroke="#6EE7B7" strokeWidth="2" /><path d="M 45 70 Q 50 72 55 70" stroke="#064E3B" strokeWidth="2" fill="none" /></svg>) },
            F: { title: { TH: "หมาตลาดนัดตอแหล", EN: "Fake Flea Market Dog" }, subtitle: { TH: "ตีหน้าเศร้าเล่าความเท็จ หลอกแดกหมูปิ้งไปทั่ว", EN: "Fakes sadness to scam grilled pork from everyone." }, description: { TH: "มึงมันตอแหล! ทำเป็นเดินขากะเผลก หรือทำตาละห้อยให้แม่ค้าหมูปิ้งสงสาร แต่พอได้แดกปุ๊บก็เดินปร๋อไปหลอกร้านอื่นต่อ มึงคือมิจฉาชีพในคราบหมาจรจัด! ชีวิตนี้มึงรอดมาได้เพราะความตอแหลล้วนๆ!", EN: "You are a fraud! You fake a limp or make sad eyes so the grilled pork vendor pities you. Once fed, you walk perfectly fine to scam the next shop. You're a furry scammer!" }, compatible: { TH: "แก๊งมิจฉาชีพคอลเซ็นเตอร์ (นิสัยเหมือนมึงเป๊ะ)", EN: "Call Center Scammers (You guys share the same DNA)" }, color: "#EC4899", bgClass: "bg-pink-50", textClass: "text-pink-600", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#FCE7F3" /><path d="M 20 20 L 35 35 L 25 50 Z" fill="#F472B6" /><path d="M 80 20 L 65 35 L 75 50 Z" fill="#F472B6" /><circle cx="32" cy="48" r="7" fill="#FFF" /><circle cx="34" cy="48" r="2" fill="#831843" /><path d="M 60 48 Q 68 40 75 48" stroke="#831843" strokeWidth="3" fill="none" /><ellipse cx="50" cy="65" rx="14" ry="10" fill="#FBCFE8" /><polygon points="47,60 53,60 50,63" fill="#831843" /><path d="M 40 68 Q 50 75 62 64" stroke="#831843" strokeWidth="2" fill="none" /></svg>) },
            G: { title: { TH: "หมาซอยเปลี่ยวขี้ระแวง", EN: "Paranoid Alley Dog" }, subtitle: { TH: "เห่าผี เห่าใบไม้ มลพิษทางเสียงที่แท้ทรู", EN: "Barks at ghosts and leaves. A true noise pollution." }, description: { TH: "มึงคือความน่ารำคาญแห่งยามวิกาล! วันๆ ไม่ทำอะไรนอกจากเห่าใบไม้ไหว เห่าผี เห่ามอเตอร์ไซค์ชาวบ้าน พอเขาจอดรถจะลงมาเตะก็วิ่งหางจุกตูด มึงคือมลพิษทางเสียงที่สร้างความเดือดร้อนให้คนทั้งซอย เก่งแต่ปาก!", EN: "You're the midnight annoyance! You do nothing but bark at wind, ghosts, and passing bikes. But when they stop to kick you, you run away. You're pure noise pollution! All bark, zero bite!" }, compatible: { TH: "ท่อไอเสียเด็กแว้น (เสียงหนวกหูพอๆ กัน)", EN: "Loud exhaust pipes (Equally annoying noises)" }, color: "#EA580C", bgClass: "bg-orange-50", textClass: "text-orange-600", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#FDBA74" /><path d="M 10 30 L 30 20 L 40 40 Z" fill="#C2410C" /><path d="M 90 30 L 70 20 L 60 40 Z" fill="#C2410C" /><circle cx="35" cy="45" r="6" fill="#FFF" /><circle cx="35" cy="45" r="2" fill="#000" /><circle cx="65" cy="45" r="4" fill="#FFF" /><circle cx="65" cy="45" r="1.5" fill="#000" /><path d="M 40 60 Q 50 80 60 60 Z" fill="#000" /><path d="M 42 60 L 45 66 L 48 60 L 52 66 L 55 60 L 58 66 L 60 60 Z" fill="#FFF" /></svg>) },
            H: { title: { TH: "หมาคาเฟ่ตกอับ", EN: "Washed-up Cafe Dog" }, subtitle: { TH: "จริตเยอะ เป็นจรจัดแต่เลือกแดก หยิ่งยโสหลงตัวเอง", EN: "Snobby stray. Beggars can't be choosers, but you are!" }, description: { TH: "มึงมันพวกจริตเยอะ! เป็นจรจัดแท้ๆ แต่ทำทรงเลือกกิน ข้าวคลุกปลาทูไม่แดก จะแดกแต่อาหารเม็ดเกรดพรีเมียม หยิ่งยโสหลงตัวเองคิดว่ายังมีปลอกคอทองคำอยู่ ถุย! ตื่นค่ะมึงเป็นแค่หมาจร ทำตัวให้มันเจียมกะลาหัวหน่อย!", EN: "You're so dramatic! A stray dog but acts picky. You refuse normal food and demand premium treats. Delusional thinking you still wear a gold collar. Spit! Wake up, you're a stray, know your place!" }, compatible: { TH: "คนอวดรวยแต่หนี้บาน (ศีลเสมอกันสุดๆ)", EN: "Fake rich people with debt (You guys match perfectly)" }, color: "#D946EF", bgClass: "bg-fuchsia-50", textClass: "text-fuchsia-600", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#F5D0FE" /><circle cx="50" cy="20" r="15" fill="#C026D3" /><circle cx="35" cy="25" r="12" fill="#C026D3" /><circle cx="65" cy="25" r="12" fill="#C026D3" /><path d="M 30 45 Q 35 40 40 45" stroke="#4A044E" strokeWidth="3" fill="none" /><path d="M 60 45 Q 65 40 70 45" stroke="#4A044E" strokeWidth="3" fill="none" /><circle cx="50" cy="52" r="4" fill="#4A044E" /><path d="M 45 60 Q 50 62 55 60" stroke="#4A044E" strokeWidth="2" fill="none" /></svg>) },
            I: { title: { TH: "หมาโจรขโมยเกิบ", EN: "Shoe-Thief Dog" }, subtitle: { TH: "มิจฉาชีพสายกายภาพ นิสัยเสียชอบลักขโมยชาวบ้าน", EN: "Physical scammer. Bad habit of stealing people's stuff." }, description: { TH: "มึงคือมิจฉาชีพสายกายภาพ! นิสัยเสียชอบลักขโมยรองเท้าแตะชาวบ้านไปกัดเล่น สร้างความเดือดร้อนให้คนทั้งซอย โรคจิตชอบสะสมขยะ มึงมันเศษสวะสังคมที่แท้ทรู! ใครอยู่ใกล้มึงคือซวยชิบหาย!", EN: "You are a physical scammer! You have a bad habit of stealing people's slippers to chew on, causing trouble for the neighborhood. A psycho garbage hoarder. You're true trash! Anyone near you is cursed!" }, compatible: { TH: "ซาเล้งเก็บของเก่า (เอาขยะมึงไปขายซะ)", EN: "Junk collectors (They can sell your hoarded trash)" }, color: "#0D9488", bgClass: "bg-teal-50", textClass: "text-teal-600", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#5EEAD4" /><path d="M 20 40 Q 50 60 80 40 Q 65 30 50 45 Q 35 30 20 40 Z" fill="#115E59" /><circle cx="35" cy="45" r="4" fill="#FFF" /><circle cx="65" cy="45" r="4" fill="#FFF" /><path d="M 40 65 Q 50 70 70 60" stroke="#115E59" strokeWidth="3" fill="none" /><path d="M 30 65 L 45 65 L 40 75 Z" fill="#EF4444" /></svg>) },
            J: { title: { TH: "หมาแก่เจ้าถิ่นขี้วีน", EN: "Grumpy Boomer Dog" }, subtitle: { TH: "มนุษย์ป้าในร่างหมา แก่จะลงโลงแล้วยังทำตัวกร่าง", EN: "Boomer in a dog's body. Old but still acts arrogantly." }, description: { TH: "มึงมันพวกมนุษย์ลุงมนุษย์ป้าในร่างหมา! แก่จะลงโลงอยู่แล้วยังทำตัวกร่าง หวงถิ่นไปทั่ว วีนใส่หมาเด็กทุกตัวที่เดินผ่าน ทั้งที่แรงจะเดินยังไม่มี สภาพ! โลกมันไปถึงไหนแล้ว เลิกทำตัวเป็นศูนย์กลางจักรวาลซะทีไอ้แก่!", EN: "You're a boomer in a dog's body! Almost in the grave but still acts arrogant. Hoarding territory, yelling at young dogs even though you can barely walk. The world has moved on, stop acting like the center of the universe, old man!" }, compatible: { TH: "ศาลพระภูมิเก่าๆ (เชิญไปสิงสถิตซะ)", EN: "Old spirit houses (Go haunt there instead)" }, color: "#57534E", bgClass: "bg-stone-100", textClass: "text-stone-700", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#A8A29E" /><path d="M 30 60 Q 30 80 50 80 Q 70 80 70 60" fill="#D6D3D1" /><path d="M 25 35 L 45 45" stroke="#44403C" strokeWidth="4" /><path d="M 75 35 L 55 45" stroke="#44403C" strokeWidth="4" /><circle cx="35" cy="50" r="4" fill="#44403C" /><circle cx="65" cy="50" r="4" fill="#44403C" /><path d="M 40 70 Q 50 65 60 70" stroke="#44403C" strokeWidth="3" fill="none" /></svg>) },
            K: { title: { TH: "หมาวินมอเตอร์ไซค์", EN: "Motorcycle Taxi Dog" }, subtitle: { TH: "ทำตัวเก๋าคุมซอย วิ่งไล่กัดล้อรถเขาไปทั่ว", EN: "Acts like a mafia boss, chasing and biting tires." }, description: { TH: "มึงนี่มันนักเลงคุมซอย! วันๆ นั่งทำแอ๊คใส่เสื้อวิน เห่ารถมอเตอร์ไซค์คันอื่นที่ขับผ่าน วิ่งไล่กวดล้อรถเขาทำทรงเก๋า แต่พอเขาจอดรถจะง้างเท้าเตะ มึงก็หันหลังวิ่งกลับวินแทบไม่ทัน โคตรกระจอก! มีดีแค่ปากจริงๆ!", EN: "You're the street mafia! Sitting around acting cool. Barking and chasing passing motorcycles. But the moment they stop to kick you, you run back to your spot in panic. You're pathetic! Only good at barking!" }, compatible: { TH: "พี่วินมอไซค์ปากซอย (ลูกพี่มึงไง)", EN: "The local motorcycle taxi guy (Your boss)" }, color: "#EA580C", bgClass: "bg-orange-100", textClass: "text-orange-700", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#D97706" /><path d="M 20 40 Q 50 70 80 40 Q 80 90 20 90 Z" fill="#EA580C" /><polygon points="15,30 30,10 40,30" fill="#B45309" /><polygon points="85,30 70,10 60,30" fill="#B45309" /><rect x="25" y="40" width="20" height="10" rx="3" fill="#1C1917" /><rect x="55" y="40" width="20" height="10" rx="3" fill="#1C1917" /><path d="M 45 45 L 55 45" stroke="#1C1917" strokeWidth="3" /><polygon points="46,60 54,60 50,64" fill="#1C1917" /><path d="M 40 70 L 60 70" stroke="#1C1917" strokeWidth="3" strokeLinecap="round" /></svg>) },

            P: { title: { TH: "หมาเฝ้าสวน", EN: "Orchard Guard Dog" }, subtitle: { TH: "ดุชิบหาย กัดไม่เลือกหน้า เป็นภัยสังคม!", EN: "Aggressive, bites randomly, highly territorial!" }, description: { TH: "หน้าตาดุเหมือนเป็นเจ้าของสวน แต่จริงๆ เป็นแค่หมาจรที่ไปอาศัยเขาอยู่! หวงของเก่ง กัดไม่เลือกหน้า ใครเดินเฉียดรั้วเป็นต้องพุ่งใส่ มึงมันเป็นภัยสังคม! ทำตัวดุกลบเกลื่อนปมด้อยล่ะสิ ระวังโดนเขาวางยานะไอ้ดุ!", EN: "You look fierce like you own the orchard, but you're just a stray living there! Extremely territorial, biting everyone who walks past the fence. You're a menace to society! Acting tough to hide your insecurities!" }, compatible: { TH: "ป้าย 'หมาดุห้ามเข้า' (ของคู่ใจมึง)", EN: "A 'Beware of Dog' sign (Your soulmate)" }, color: "#4D7C0F", bgClass: "bg-green-50", textClass: "text-green-700", illustration: (<svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#1C1917" /><polygon points="15,30 30,10 40,35" fill="#000" /><polygon points="85,30 70,10 60,35" fill="#000" /><path d="M 25 45 L 45 50" stroke="#EF4444" strokeWidth="3" /><path d="M 75 45 L 55 50" stroke="#EF4444" strokeWidth="3" /><circle cx="35" cy="52" r="3" fill="#EF4444" /><circle cx="65" cy="52" r="3" fill="#EF4444" /><polygon points="46,60 54,60 50,64" fill="#44403C" /><path d="M 35 70 Q 50 65 65 70" stroke="#FFF" strokeWidth="2" fill="none" /><polygon points="40,70 45,75 48,68" fill="#FFF" /><polygon points="60,70 55,75 52,68" fill="#FFF" /></svg>) }

            const handleAnswer = (trait) => {
                setScores(prev => ({ ...prev, [trait]: prev[trait] + 1 }));
                if (currentQuestionIndex < questions.length - 1) { setCurrentQuestionIndex(prev => prev + 1); } else { processResult(); }
            };
            const processResult = () => {
                setScreen('loading');
                setTimeout(() => {
                    let highestTrait = 'A'; let maxScore = scores['A'];

                                <h2 className="text-2xl font-bold text-[#4a3f35] mb-4">{lang === 'TH' ? '🚨 คำเตือนก่อนเล่น 🚨' : '🚨 Trigger Warning 🚨'}</h2>
                                <p className="text-[#6c5f53] mb-8 text-sm leading-relaxed">
                                    {lang === 'TH' ? (<>เว็บไซต์นี้สร้างขึ้นมาเพื่อความ <b>บันเทิงและขำขัน</b><br/><br/>หากคุณเป็น <span className="text-red-500 font-bold">โรคซึมเศร้า แพนิค หรือเป็นคนเซนซิทีฟคิดมาก</span><br/>แอดมินแนะนำให้ <b>ปิดหน้านี้ไปเลย</b> นะครับ<br/>(เป็นห่วงสุขภาพจิตใจจริงๆ น้า 🥺)</>) : (<>This website is made for <b>entertainment and jokes</b>.<br/><br/>If you suffer from <span className="text-red-500 font-bold">depression, panic attacks, or are sensitive</span>,<br/>we highly recommend you <b>close this page now</b>.<br/>(We truly care about your mental health 🥺)</>)}
                                </p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={proceedToQuiz} className="w-full bg-[#ffb067] text-white rounded-full py-4 px-8 font-bold text-base shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300">{lang === 'TH' ? 'ฉันสตรองพอ! ขอไปต่อ' : 'I am strong! Let\'s go'}</button>
                                    <button onClick={resetQuiz} className="w-full bg-white border-2 border-[#e6dfd5] text-[#5c4d43] rounded-full py-4 px-8 font-bold text-base hover:border-[#ffb067] hover:bg-[#fff9f2] transition-all duration-300">{lang === 'TH' ? 'กลับหน้าแรกดีกว่า' : 'Go back to home'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {screen === 'quiz' && (
                        <div className="max-w-md w-full animate-fade-in flex flex-col">
                            <div className="mb-6 px-2">
                                <div className="flex justify-between text-xs text-[#8e7f72] font-medium mb-2">
                                    <span>{lang === 'TH' ? 'คำถามที่' : 'Question'} {currentQuestionIndex + 1}</span>
                                    <span>{lang === 'TH' ? `${questions.length} ข้อ` : `${questions.length} total`}</span>
                                </div>
                                <div className="w-full bg-[#f0eae1] rounded-full h-2.5 overflow-hidden">
                                    <div className="bg-[#ffb067] h-2.5 rounded-full transition-all duration-500 ease-out" style={{ width: `${((currentQuestionIndex + 1) / questions.length) * 100}%` }}></div>
                                </div>
                            </div>
                            <div className="bg-white rounded-[2rem] shadow-sm border border-[#f0eae1] p-6 md:p-8 w-full mb-6">
                                <h2 className="text-xl font-bold text-[#4a3f35] mb-8 text-center leading-snug">{questions[currentQuestionIndex].question[lang]}</h2>
                                <div className="flex flex-col gap-3">
                                    {questions[currentQuestionIndex].options.map((option, idx) => (
                                        <button key={idx} onClick={() => handleAnswer(option.trait)} className="w-full text-left bg-white border-2 border-[#e6dfd5] text-[#5c4d43] rounded-2xl py-4 px-6 font-medium hover:border-[#ffb067] hover:bg-[#fff9f2] active:bg-[#ffeedb] transition-all duration-200 shadow-sm">
                                            {option.text[lang]}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {screen === 'loading' && (
                        <div className="max-w-md w-full h-[60vh] flex flex-col items-center justify-center animate-fade-in">
                            <div className="relative w-24 h-24 mb-6 animate-bounce">
                                <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md"><circle cx="50" cy="55" r="35" fill="#FBBF24" /><ellipse cx="25" cy="50" rx="10" ry="20" fill="#D97706" /><ellipse cx="75" cy="50" rx="10" ry="20" fill="#D97706" /><circle cx="35" cy="50" r="6" fill="#FFF" /><circle cx="65" cy="50" r="6" fill="#FFF" /><circle cx="33" cy="50" r="2" fill="#1C1917" /><circle cx="67" cy="50" r="2" fill="#1C1917" /><circle cx="50" cy="60" r="12" fill="#FEF3C7" /><polygon points="46,55 54,55 50,60" fill="#431407" /><path d="M 45 62 Q 50 70 55 62 Z" fill="#FCA5A5" /></svg>
                                <div className="absolute top-0 right-[-10px] animate-ping"><IconSparkles className="w-4 h-4 text-yellow-400" /></div>
                                <div className="absolute bottom-0 left-[-10px] animate-ping" style={{animationDelay: '0.5s'}}><IconSparkles className="w-6 h-6 text-yellow-400" /></div>
                            </div>
                            <h2 className="text-xl font-bold text-[#4a3f35] mb-2">{lang === 'TH' ? 'กำลังประมวลผล...' : 'Processing...'}</h2>
                            <p className="text-[#8e7f72] text-sm">{lang === 'TH' ? 'ค้นหา DNA ความเป็นหมาในตัวคุณ 🦴' : 'Finding your inner dog DNA 🦴'}</p>
                        </div>
                    )}

                    {screen === 'result' && finalResult && (
                        <div className="max-w-md w-full animate-fade-in flex flex-col items-center pb-10">
                            <div className={`w-full rounded-[2.5rem] shadow-sm border border-[#f0eae1] p-8 md:p-10 text-center relative overflow-hidden bg-white mb-6`}>
                                <p className="text-sm font-bold text-[#8e7f72] tracking-widest uppercase mb-4">{lang === 'TH' ? 'สภาพอย่างมึงคือ...' : 'Your pathetic state is...'}</p>
                                <div className={`w-48 h-48 mx-auto rounded-full ${results[finalResult].bgClass} flex items-center justify-center mb-6 border-4 border-white shadow-inner relative [&>svg]:w-40 [&>svg]:h-40`}>
                                    <div className="absolute w-full h-full animate-spin-slow rounded-full border-2 border-dashed border-[#e6dfd5] opacity-50 pointer-events-none"></div>
                                    {results[finalResult].illustration}
                                </div>
                                <h1 className={`text-2xl md:text-3xl font-bold mb-2 ${results[finalResult].textClass}`}>{results[finalResult].title[lang]}</h1>
                                <p className="text-[#ffb067] font-medium mb-6">"{results[finalResult].subtitle[lang]}"</p>
                                <div className="w-12 h-1 bg-gray-200 mx-auto rounded-full mb-6"></div>
                                <p className="text-[#6c5f53] text-sm leading-relaxed mb-8 text-left bg-gray-50 p-5 rounded-2xl">{results[finalResult].description[lang]}</p>
                                <div className="bg-[#fff9f2] border border-[#ffe0c2] rounded-2xl p-4 mb-8 text-left flex items-start gap-4">
                                    <div className="bg-[#ffb067] p-2 rounded-xl text-white"><IconHeart className="w-5 h-5" /></div>
                                    <div>
                                        <h3 className="text-sm font-bold text-[#4a3f35] mb-1">{lang === 'TH' ? 'พวกที่สมควรอยู่กับมึง' : 'Those who deserve to be with you'}</h3>
                                        <p className="text-[#8e7f72] text-sm">{results[finalResult].compatible[lang]}</p>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-3">
                                    <button onClick={handleShare} className="w-full bg-[#4a3f35] text-white rounded-full py-4 px-8 font-bold text-base hover:bg-[#342c25] hover:-translate-y-1 transition-all duration-300 flex justify-center items-center gap-2"><IconShare2 className="w-5 h-5" /> {lang === 'TH' ? 'ประจานตัวเองให้เพื่อนดู' : 'Expose yourself to friends'}</button>
                                    <button onClick={resetQuiz} className="w-full bg-white border-2 border-[#e6dfd5] text-[#5c4d43] rounded-full py-4 px-8 font-bold text-base hover:border-[#ffb067] hover:bg-[#fff9f2] transition-all duration-300 flex justify-center items-center gap-2"><IconRotateCcw className="w-5 h-5" /> {lang === 'TH' ? 'ยอมรับความจริงไม่ได้? กดเล่นใหม่ดิ' : 'Cannot accept the truth? Play again'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const rootElement = document.getElementById("root");
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
